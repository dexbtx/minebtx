name: Build btx-gbt-solve (macos-arm64-metal)

# Manual trigger — builds the dexbtx-patched btx-gbt-solve for Apple Silicon
# (arm64) with the Metal backend. Sibling of build-solver-aarch64.yml; same
# patches, same V2 (nonce-seed) solver source, no CUDA.
#
# Output: workflow artifact `btx-gbt-solve-darwin-arm64-<tag>` containing the
# built binary. The verify step gates on a post-125000 V2 reference digest, so
# a green run guarantees the Metal kernel is bit-equivalent to the production
# Linux solver. To publish: download from the run (or flip publish_release=true
# to attach it to the prebuilds release as asset `btx-gbt-solve-darwin-arm64`).
#
# Patches applied (from .github/build-patches/):
#   05-cmakelists-add-gbt-solve-target.patch — make btx-gbt-solve a build target
#   btx-gbt-solve.cpp (full file)           — copied in; upstream tree doesn't have it
#
# Patches 02/03 dropped at v0.32.3 — share_target_override is now upstream
# in pow.h/pow.cpp. Patch 01 was never applied on macOS anyway (CUDA off).

on:
  workflow_dispatch:
    inputs:
      btx_tag:
        description: 'btxchain/btx tag/branch to build from'
        required: true
        default: 'v0.32.3'
      publish_release:
        description: 'Attach the binary to the prebuilds release as btx-gbt-solve-darwin-arm64'
        required: true
        type: boolean
        default: false
      release_tag:
        description: 'Release tag to attach the asset to (when publish_release=true)'
        required: true
        default: 'btx-prebuilds-v0.32.3'

jobs:
  build:
    runs-on: macos-14   # Apple Silicon (M1) — real GPU, so --backend metal genuinely engages
    timeout-minutes: 90
    permissions:
      contents: write   # needed for the optional gh release upload step
    steps:
      - name: Checkout this repo (for patches + reference vector)
        uses: actions/checkout@v4

      - name: Show runner info
        run: |
          uname -a
          sysctl -n machdep.cpu.brand_string || true
          sysctl -n hw.ncpu
          xcrun --version || true
          xcrun -sdk macosx metal --version 2>&1 | head -2 || true

      - name: Install build deps (brew)
        run: |
          brew update
          # cmake/boost/libevent are the core BTX build deps; pkgconf for find;
          # ninja for a faster build. sqlite3 ships in the macOS SDK.
          brew install cmake boost libevent pkgconf ninja

      - name: Clone BTX source
        run: |
          git clone --depth 1 --branch "${{ inputs.btx_tag }}" \
            https://github.com/btxchain/btx btx-src
          (cd btx-src && git rev-parse HEAD)

      - name: Apply dexbtx patches (no CUDA gate on macOS)
        working-directory: btx-src
        run: |
          set -euo pipefail
          PATCH_DIR="$GITHUB_WORKSPACE/.github/build-patches"
          ls -la "$PATCH_DIR"
          for p in 05-cmakelists-add-gbt-solve-target.patch 12-darwin-metal-opt135-embedded-sync.patch; do
            echo "=== applying $p ==="
            patch -p1 < "$PATCH_DIR/$p"
          done
          cp "$PATCH_DIR/btx-gbt-solve.cpp" src/btx-gbt-solve.cpp
          echo "=== verify upstream v0.32.3 has V2 activation in chainparams ==="
          grep -n "nMatMulNonceSeedHeight = 125" src/kernel/chainparams.cpp \
            || { echo "ERROR: v0.32.3 chainparams missing V2 activation — wrong tag?"; exit 1; }
          echo "=== verify upstream v0.32.3 has share_target_override ==="
          grep -nE 'share_target_override' src/pow.h src/pow.cpp \
            || { echo "ERROR: v0.32.3 missing share_target_override — wrong tag?"; exit 1; }

      - name: Configure cmake (Metal, no CUDA)
        working-directory: btx-src
        run: |
          set -euo pipefail
          mkdir -p build && cd build
          cmake .. -G Ninja \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON \
            -DBTX_ENABLE_CUDA_EXPERIMENTAL=OFF \
            -DBTX_ENABLE_METAL=ON \
            -DBTX_MATMUL_METAL_PRECOMPILE_KERNELS=ON \
            -DBUILD_GUI=OFF \
            -DBUILD_TESTS=OFF \
            -DBUILD_BENCH=OFF \
            -DBUILD_FUZZ_BINARY=OFF \
            -DBUILD_UTIL=ON

      - name: Build btx-gbt-solve + backend-info
        working-directory: btx-src/build
        run: |
          set -euo pipefail
          cmake --build . --target btx-gbt-solve btx-matmul-backend-info -j "$(sysctl -n hw.ncpu)"

      - name: Inspect binary
        working-directory: btx-src/build
        run: |
          set -euo pipefail
          # Absolute path so later steps (which run from the workspace root)
          # can find it regardless of working-directory.
          BIN="$(find "$PWD" -name btx-gbt-solve -type f -perm +111 | head -1)"
          echo "BIN=$BIN" >> "$GITHUB_ENV"
          ls -la "$BIN"
          file "$BIN"
          lipo -archs "$BIN" || true
          echo "SHA256: $(shasum -a 256 "$BIN" | awk '{print $1}')"
          echo "=== --help (expect share-target + daemon + metal) ==="
          "$BIN" --help 2>&1 | head -40 || true
          echo "=== Metal framework actually linked? ==="
          otool -L "$BIN" | grep -iE "Metal|Foundation" || echo "WARN: no Metal/Foundation in otool -L"

      - name: Assert Metal backend is available (not CPU-only)
        working-directory: btx-src/build
        run: |
          set -euo pipefail
          INFO="$(find . -name btx-matmul-backend-info -type f | head -1)"
          echo "backend-info: $INFO"
          OUT="$("$INFO" 2>&1 || true)"
          echo "$OUT"
          echo "$OUT" | grep -iE "metal" | grep -ivE "unavailable|not available|disabled" \
            || { echo "ERROR: Metal backend not reported available — build would silently CPU-fallback"; exit 1; }

      - name: Verify bit-equivalence vs post-125000 V2 reference digest
        working-directory: btx-src/build
        run: |
          set -euo pipefail
          REF="$GITHUB_WORKSPACE/.github/build-patches/ci-refvec.json"
          EXP_DIGEST="$(python3 -c "import json;print(json.load(open('$REF'))['expected']['matmul_digest'])")"
          VEC="$(python3 -c "import json;print(json.dumps(json.load(open('$REF'))['job']))")"
          echo "expected digest: $EXP_DIGEST"
          echo "vector: $VEC"
          run_backend() {
            local be="$1"
            echo "$VEC" | BTX_MATMUL_BACKEND="$be" "$BIN" --daemon --backend "$be" --solver-threads 1 2>/dev/null \
              | python3 -c "import sys,json;print(json.load(sys.stdin).get('matmul_digest','NONE'))"
          }
          CPU_D="$(run_backend cpu)";   echo "cpu   digest: $CPU_D"
          METAL_D="$(run_backend metal)"; echo "metal digest: $METAL_D"
          [ "$CPU_D" = "$EXP_DIGEST" ]   || { echo "FAIL: CPU digest mismatch (kernel/source wrong)"; exit 1; }
          [ "$METAL_D" = "$EXP_DIGEST" ] || { echo "FAIL: Metal digest mismatch (Metal kernel NOT bit-equivalent)"; exit 1; }
          echo "PASS: cpu == metal == reference. Metal kernel is consensus-correct post-125000."

      - name: Assert GPU pre-hash scan engages (not CPU fallback)
        working-directory: btx-src/build
        run: |
          set -euo pipefail
          REF="$GITHUB_WORKSPACE/.github/build-patches/ci-refvec.json"
          JOB=$(python3 -c '
          import json,sys
          j=json.load(open(sys.argv[1]))["job"]
          j.update(bits="1d00ffff", block_height=131000, parent_mtp=1700000000,
                   nonce_start=1, max_tries=100000000000, max_seconds=6)
          j.pop("share_target", None)
          print(json.dumps(j))' "$REF")
          RATE=$(printf '%s\n' "$JOB" | "$BIN" --daemon --backend metal --solver-threads 1 2>/dev/null | python3 -c '
          import sys,json
          for line in sys.stdin:
              try: d=json.loads(line)
              except Exception: continue
              if "tries_used" in d and d.get("elapsed_s",0)>0:
                  print(int(d["tries_used"]/d["elapsed_s"])); break')
          echo "metal V3 scan rate: ${RATE:-0} nonce/s"
          if [ "${RATE:-0}" -le 1000000 ]; then
            echo "FAIL: scan ${RATE:-0} nonce/s <= 1M = CPU fallback; this build would ship throttled (~33x slow)."
            exit 1
          fi
          echo "PASS: GPU pre-hash scan engaged (${RATE} nonce/s)."

      - name: Gate — embedded KERNEL_SOURCE is current (deny metallib = the fleet path)
        working-directory: btx-src/build
        run: |
          set -euo pipefail
          # The fleet ships no metallib asset, so every fleet Mac falls through to
          # the embedded KERNEL_SOURCE. The digest check above runs the *metallib*
          # (build dir present) — it does NOT exercise the embedded string. And
          # because the opts are byte-exact, a STALE embedded string would still
          # pass a digest check, just slower. So gate the embedded path on BOTH
          # byte-exactness AND optimized throughput.
          REF="$GITHUB_WORKSPACE/.github/build-patches/ci-refvec.json"
          EXP="$(python3 -c "import json;print(json.load(open('$REF'))['expected']['matmul_digest'])")"
          VEC="$(python3 -c "import json;print(json.dumps(json.load(open('$REF'))['job']))")"
          EMB_D="$(echo "$VEC" | BTX_MATMUL_METALLIB_PATH=/nope BTX_ORACLE_METALLIB_PATH=/nope \
            "$BIN" --daemon --backend metal --solver-threads 1 2>/dev/null \
            | python3 -c "import sys,json;print(json.load(sys.stdin).get('matmul_digest','NONE'))")"
          echo "embedded-path digest: $EMB_D (expect $EXP)"
          [ "$EMB_D" = "$EXP" ] || { echo "FAIL: embedded KERNEL_SOURCE digest mismatch — embedded string STALE vs .metal"; exit 1; }
          JOB="$(python3 -c '
          import json,sys
          j=json.load(open(sys.argv[1]))["job"]
          j.update(bits="1d00ffff", block_height=131000, parent_mtp=1700000000, nonce_start=1, max_tries=100000000000, max_seconds=6)
          j.pop("share_target", None)
          print(json.dumps(j))' "$REF")"
          rate() { printf '%s\n' "$JOB" | env "$@" "$BIN" --daemon --backend metal --solver-threads 1 2>/dev/null | python3 -c '
          import sys,json
          for line in sys.stdin:
              try: d=json.loads(line)
              except Exception: continue
              if "tries_used" in d and d.get("elapsed_s",0)>0:
                  print(int(d["tries_used"]/d["elapsed_s"])); break'; }
          R_LIB="$(rate)"
          R_EMB="$(rate BTX_MATMUL_METALLIB_PATH=/nope BTX_ORACLE_METALLIB_PATH=/nope)"
          echo "metallib rate: ${R_LIB:-0} | embedded rate: ${R_EMB:-0} nonce/s"
          [ "${R_EMB:-0}" -gt 1000000 ] || { echo "FAIL: embedded rate <=1M (CPU fallback / broken embedded path)"; exit 1; }
          python3 -c "import sys; lib=${R_LIB:-0}; emb=${R_EMB:-0}; sys.exit(0 if lib>0 and emb>=0.9*lib else 1)" \
            || { echo "FAIL: embedded rate <90% of metallib — embedded string is STALE (un-synced optimizations)"; exit 1; }
          echo "PASS: embedded path byte-exact + at optimized rate. Fleet-runtime path verified current."

      - name: Stage binary for upload
        run: |
          set -euo pipefail
          mkdir -p out
          cp "$BIN" out/btx-gbt-solve-darwin-arm64
          shasum -a 256 out/btx-gbt-solve-darwin-arm64 | tee out/btx-gbt-solve-darwin-arm64.sha256
          echo "Pin this in pyproject.toml/install.sh: $(awk '{print $1}' out/btx-gbt-solve-darwin-arm64.sha256)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: btx-gbt-solve-darwin-arm64-${{ inputs.btx_tag }}
          path: out/*
          retention-days: 30
          if-no-files-found: error

      - name: Publish to release (optional)
        if: ${{ inputs.publish_release }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release upload "${{ inputs.release_tag }}" \
            out/btx-gbt-solve-darwin-arm64 \
            --repo "${{ github.repository }}" --clobber
