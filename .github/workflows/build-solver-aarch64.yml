name: Build btx-gbt-solve (aarch64-linux-cuda)

# Manual trigger — builds the dexbtx-patched btx-gbt-solve for aarch64 Linux
# with CUDA. Targets GB10 / Grace Blackwell (sm_120/sm_121) by default but
# the arch list is configurable.
#
# Output: workflow artifact `btx-gbt-solve-aarch64-linux-gnu-cuda12-<tag>`
# containing the built binary. To publish, manually download from the
# workflow run and attach to a release (or extend this workflow to do so
# automatically once we've validated a few successful builds).
#
# Patches applied (from .github/build-patches/):
#   05-cmakelists-add-gbt-solve-target.patch — make btx-gbt-solve a build target
#   btx-gbt-solve.cpp (full file)   — copied in; upstream tree doesn't have it
#
# Patches 01/02/03 dropped at v0.32.3 — all upstreamed:
#   - share_target_override restored upstream in pow.h/pow.cpp (patches 02/03)
#   - CUDA capability gate now opt-in via env var BTX_CUDA_ALLOW_OLDER_GPUS=1
#     (patch 01) — the wrapper / install.sh sets this at runtime; no source
#     patch needed. Without the env var, the runtime gate stays at sm_80+.

on:
  workflow_dispatch:
    inputs:
      btx_tag:
        description: 'btxchain/btx tag/branch to build from'
        required: true
        default: 'v0.32.3'
      cuda_arches:
        description: 'CUDA archs (semicolon-separated). NOTE: sm_121 requires CUDA 13.0+. With cuda_version=12-8 use 80;90;120 (Ampere through Blackwell consumer).'
        required: true
        default: '80;90;120'
      cuda_version:
        description: 'CUDA toolkit version'
        required: true
        type: choice
        options: ['12-8', '13-0']
        default: '12-8'
      publish_release:
        description: 'Attach the binary to the prebuilds release as btx-gbt-solve-aarch64-linux-gnu-cuda<major>'
        required: true
        type: boolean
        default: false
      release_tag:
        description: 'Release tag to attach the asset to (when publish_release=true)'
        required: true
        default: 'btx-prebuilds-v0.32.3'

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 90
    permissions:
      contents: write   # for the optional gh release upload step
    steps:
      - name: Checkout this repo (for patches)
        uses: actions/checkout@v4

      - name: Show runner info
        run: |
          uname -a
          nproc
          free -h
          df -h /

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake build-essential git ninja-build pkg-config \
            libboost-system-dev libboost-filesystem-dev libboost-test-dev \
            libevent-dev libsqlite3-dev \
            libminiupnpc-dev libnatpmp-dev libzmq3-dev \
            python3 wget ca-certificates gnupg patch

      - name: Install CUDA toolkit (aarch64-sbsa)
        run: |
          # NVIDIA's CUDA repo for ARM64 server-base-systems (Grace, Graviton, Ampere Altra).
          # GitHub's arm64 runner is Ubuntu 24.04, so use ubuntu2404 sbsa repo.
          wget -q https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/sbsa/cuda-keyring_1.1-1_all.deb
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          sudo apt-get update
          # Toolkit only (compilers + libs). No driver — there's no GPU on the runner;
          # we're producing a binary for the user's GB10 Spark, not running it here.
          sudo apt-get install -y --no-install-recommends \
            cuda-toolkit-${{ inputs.cuda_version }}
          echo "/usr/local/cuda/bin" >> $GITHUB_PATH
          /usr/local/cuda/bin/nvcc --version

      - name: Clone BTX source
        run: |
          git clone --depth 1 --branch ${{ inputs.btx_tag }} \
            https://github.com/btxchain/btx btx-src
          (cd btx-src && git rev-parse HEAD)

      - name: Apply dexbtx patches
        working-directory: btx-src
        run: |
          PATCH_DIR="$GITHUB_WORKSPACE/.github/build-patches"
          echo "Patches available:"
          ls -la "$PATCH_DIR"

          # Apply patch 05 (cmake target — always needed).
          # Patches 10 and 11 (PR#58 kernel opts: windowed SHA + factored matmul)
          # were upstreamed in BTX v0.32.8 and are not applied here. Verify the
          # upstream-merged code by signature greps below so we fail loud on a
          # mis-tagged build (e.g. trying to build v0.32.5 with this workflow,
          # which would NOT have the PR58 code and would silently produce a
          # slower kernel).
          echo "=== applying 05-cmakelists-add-gbt-solve-target.patch ==="
          patch -p1 < "$PATCH_DIR/05-cmakelists-add-gbt-solve-target.patch"

          # Sanity-check PR#58 upstream signatures (only present in v0.32.8+).
          if ! grep -q "WINDOWED SHA-256" src/cuda/oracle_accel.cu 2>/dev/null; then
            echo "ERROR: PR#58 windowed SHA-256 not found in src/cuda/oracle_accel.cu — this workflow requires v0.32.8+ source"
            exit 1
          fi
          echo "  PR#58 (windowed SHA + factored matmul) confirmed upstream in source tree"

          # Copy in btx-gbt-solve.cpp (full file; upstream tree doesn't have it).
          # v0.32.3 sets nMatMulNonceSeedHeight=125'000 in chainparams.cpp for
          # mainnet, so the inline override in btx-gbt-solve.cpp is now
          # redundant-but-harmless (sets the same value).
          cp "$PATCH_DIR/btx-gbt-solve.cpp" src/btx-gbt-solve.cpp
          echo "=== btx-gbt-solve.cpp installed ==="
          ls -la src/btx-gbt-solve.cpp
          # Sanity: confirm upstream now has the chainparams-side V2 activation.
          grep -n "nMatMulNonceSeedHeight = 125" src/kernel/chainparams.cpp \
            || (echo "ERROR: v0.32.3 chainparams missing V2 activation — wrong tag?"; exit 1)
          # Sanity: confirm upstream now has share_target_override (patches 02/03 obsolete).
          grep -nE 'share_target_override' src/pow.h src/pow.cpp \
            || (echo "ERROR: v0.32.3 missing share_target_override — wrong tag?"; exit 1)

      - name: Configure cmake
        working-directory: btx-src
        # No `| tail` here — full output, propagating non-zero exit cleanly.
        run: |
          set -euo pipefail
          mkdir -p build
          cd build
          export CUDACXX=/usr/local/cuda/bin/nvcc
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON \
            -DBTX_ENABLE_CUDA_EXPERIMENTAL=ON \
            -DBTX_CUDA_ARCHITECTURES="${{ inputs.cuda_arches }}" \
            -DCMAKE_CUDA_COMPILER=/usr/local/cuda/bin/nvcc \
            -DBUILD_GUI=OFF \
            -DBUILD_TESTS=OFF \
            -DBUILD_BENCH=OFF \
            -DBUILD_FUZZ_BINARY=OFF \
            -DBUILD_UTIL=ON

      - name: Build btx-gbt-solve
        working-directory: btx-src/build
        run: |
          set -euo pipefail
          cmake --build . --target btx-gbt-solve -j $(nproc)

      - name: Verify binary
        working-directory: btx-src/build
        run: |
          ls -la bin/btx-gbt-solve
          file bin/btx-gbt-solve
          echo "SHA256:"
          sha256sum bin/btx-gbt-solve
          echo
          echo "=== --help (expecting share-target + backend flags) ==="
          ./bin/btx-gbt-solve --help 2>&1 | head -30 || true
          echo
          echo "=== LTO symbol count (expecting > 0) ==="
          nm bin/btx-gbt-solve 2>/dev/null | grep -c lto_priv || true
          echo
          echo "=== CUDA arch ELF images embedded ==="
          /usr/local/cuda/bin/cuobjdump --list-elf bin/btx-gbt-solve 2>&1 | head -20 || true
          echo
          echo "=== .nv_fatbin section present? ==="
          readelf -S bin/btx-gbt-solve 2>/dev/null | grep -E "nv_fatbin|nvFatBin" | head -3 || true

      - name: Verify bit-equivalence (CPU) vs post-125000 V2 reference
        working-directory: btx-src/build
        run: |
          set -euo pipefail
          # The ARM runner has no GPU, so we can't exercise the CUDA kernel here
          # (the cuobjdump/nv_fatbin checks above confirm the cubins are present).
          # But the CPU backend runs fine and shares the consensus seed/digest
          # path, so this gate proves the build is V2-aware (post-block-125000
          # nonce-seed) and consensus-correct — catching a wrong/v1 source.
          REF="$GITHUB_WORKSPACE/.github/build-patches/ci-refvec.json"
          EXP="$(python3 -c "import json;print(json.load(open('$REF'))['expected']['matmul_digest'])")"
          VEC="$(python3 -c "import json;print(json.dumps(json.load(open('$REF'))['job']))")"
          echo "expected: $EXP"
          GOT="$(echo "$VEC" | BTX_MATMUL_BACKEND=cpu bin/btx-gbt-solve --daemon --backend cpu --solver-threads 1 2>/dev/null \
                 | python3 -c 'import sys,json;print(json.load(sys.stdin).get("matmul_digest","NONE"))')"
          echo "got (cpu): $GOT"
          [ "$GOT" = "$EXP" ] || { echo "FAIL: CPU digest mismatch — kernel/source wrong or not V2-aware"; exit 1; }
          echo "PASS: CPU kernel is consensus-correct post-125000 (V2). CUDA cubins verified structurally above."

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: btx-gbt-solve-aarch64-linux-gnu-cuda${{ inputs.cuda_version }}-${{ inputs.btx_tag }}
          path: btx-src/build/bin/btx-gbt-solve
          retention-days: 30
          if-no-files-found: error

      - name: Publish to release (optional)
        if: ${{ inputs.publish_release }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          CUDA_MAJOR="${{ inputs.cuda_version }}"; CUDA_MAJOR="${CUDA_MAJOR%%-*}"
          ASSET="btx-gbt-solve-aarch64-linux-gnu-cuda${CUDA_MAJOR}"
          cp btx-src/build/bin/btx-gbt-solve "$ASSET"
          echo "sha256 to pin in install.sh (AARCH64_CUDA${CUDA_MAJOR}_SHA256): $(sha256sum "$ASSET" | awk '{print $1}')"
          gh release upload "${{ inputs.release_tag }}" "$ASSET" --repo "${{ github.repository }}" --clobber
