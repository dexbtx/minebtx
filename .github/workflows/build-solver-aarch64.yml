name: Build btx-gbt-solve (aarch64-linux-cuda)

# Manual trigger — builds the dexbtx-patched btx-gbt-solve for aarch64 Linux
# with CUDA. Targets GB10 / Grace Blackwell (sm_120/sm_121) by default but
# the arch list is configurable.
#
# Output: workflow artifact `btx-gbt-solve-aarch64-linux-gnu-cuda12-<tag>`
# containing the built binary. To publish, manually download from the
# workflow run and attach to a release (or extend this workflow to do so
# automatically once we've validated a few successful builds).
#
# Patches applied (from .github/build-patches/):
#   01-cuda-capability-gate.patch   — MIN_SUPPORTED_COMPUTE_CAPABILITY_MAJOR 8→6
#   02-pow-h-share-target-override.patch  — restore share_target_override decl
#   03-pow-cpp-share-target-override.patch — restore share_target_override impl
#   05-cmakelists-add-gbt-solve-target.patch — make btx-gbt-solve a build target
#   btx-gbt-solve.cpp (full file)   — copied in; upstream tree doesn't have it

on:
  workflow_dispatch:
    inputs:
      btx_tag:
        description: 'btxchain/btx tag/branch to build from'
        required: true
        default: 'v0.32.2'
      cuda_arches:
        description: 'CUDA archs (semicolon-separated). GB10=120;121. A100=80. H100=90.'
        required: true
        default: '80;90;120;121'
      cuda_version:
        description: 'CUDA toolkit version'
        required: true
        type: choice
        options: ['12-8', '13-0']
        default: '12-8'

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 90
    steps:
      - name: Checkout this repo (for patches)
        uses: actions/checkout@v4

      - name: Show runner info
        run: |
          uname -a
          nproc
          free -h
          df -h /

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake build-essential git ninja-build pkg-config \
            libboost-system-dev libboost-filesystem-dev libboost-test-dev \
            libevent-dev libsqlite3-dev \
            libminiupnpc-dev libnatpmp-dev libzmq3-dev \
            python3 wget ca-certificates gnupg patch

      - name: Install CUDA toolkit (aarch64-sbsa)
        run: |
          # NVIDIA's CUDA repo for ARM64 server-base-systems (Grace, Graviton, Ampere Altra).
          # GitHub's arm64 runner is Ubuntu 24.04, so use ubuntu2404 sbsa repo.
          wget -q https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/sbsa/cuda-keyring_1.1-1_all.deb
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          sudo apt-get update
          # Toolkit only (compilers + libs). No driver — there's no GPU on the runner;
          # we're producing a binary for the user's GB10 Spark, not running it here.
          sudo apt-get install -y --no-install-recommends \
            cuda-toolkit-${{ inputs.cuda_version }}
          echo "/usr/local/cuda/bin" >> $GITHUB_PATH
          /usr/local/cuda/bin/nvcc --version

      - name: Clone BTX source
        run: |
          git clone --depth 1 --branch ${{ inputs.btx_tag }} \
            https://github.com/btxchain/btx btx-src
          (cd btx-src && git rev-parse HEAD)

      - name: Apply dexbtx patches
        working-directory: btx-src
        run: |
          PATCH_DIR="$GITHUB_WORKSPACE/.github/build-patches"
          echo "Patches available:"
          ls -la "$PATCH_DIR"

          # Apply each upstream-file patch
          for p in 01-cuda-capability-gate.patch \
                   02-pow-h-share-target-override.patch \
                   03-pow-cpp-share-target-override.patch \
                   05-cmakelists-add-gbt-solve-target.patch; do
            echo "=== applying $p ==="
            patch -p1 < "$PATCH_DIR/$p"
          done

          # Copy in btx-gbt-solve.cpp (full file; upstream tree doesn't have it).
          # File already has nMatMulNonceSeedHeight=125000 set internally.
          cp "$PATCH_DIR/btx-gbt-solve.cpp" src/btx-gbt-solve.cpp
          echo "=== btx-gbt-solve.cpp installed ==="
          ls -la src/btx-gbt-solve.cpp
          grep -n "nMatMulNonceSeedHeight" src/btx-gbt-solve.cpp || \
            (echo "ERROR: V2 activation height not set in btx-gbt-solve.cpp"; exit 1)

      - name: Configure cmake
        working-directory: btx-src
        run: |
          mkdir -p build
          cd build
          export CUDACXX=/usr/local/cuda/bin/nvcc
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON \
            -DBTX_ENABLE_CUDA_EXPERIMENTAL=ON \
            -DBTX_CUDA_ARCHITECTURES="${{ inputs.cuda_arches }}" \
            -DCMAKE_CUDA_COMPILER=/usr/local/cuda/bin/nvcc \
            -DBUILD_GUI=OFF \
            -DBUILD_TESTS=OFF \
            -DBUILD_FUZZ_BINARIES=OFF \
            -DBUILD_BENCH=OFF 2>&1 | tail -40

      - name: Build btx-gbt-solve
        working-directory: btx-src/build
        run: |
          cmake --build . --target btx-gbt-solve -j $(nproc) 2>&1 | tail -100

      - name: Verify binary
        working-directory: btx-src/build
        run: |
          ls -la bin/btx-gbt-solve
          file bin/btx-gbt-solve
          echo "SHA256:"
          sha256sum bin/btx-gbt-solve
          echo
          echo "=== --help (expecting share-target + backend flags) ==="
          ./bin/btx-gbt-solve --help 2>&1 | head -30 || true
          echo
          echo "=== LTO symbol count (expecting > 0) ==="
          nm bin/btx-gbt-solve 2>/dev/null | grep -c lto_priv || true
          echo
          echo "=== CUDA arch ELF images embedded ==="
          /usr/local/cuda/bin/cuobjdump --list-elf bin/btx-gbt-solve 2>&1 | head -20 || true
          echo
          echo "=== .nv_fatbin section present? ==="
          readelf -S bin/btx-gbt-solve 2>/dev/null | grep -E "nv_fatbin|nvFatBin" | head -3 || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: btx-gbt-solve-aarch64-linux-gnu-cuda${{ inputs.cuda_version }}-${{ inputs.btx_tag }}
          path: btx-src/build/bin/btx-gbt-solve
          retention-days: 30
          if-no-files-found: error
