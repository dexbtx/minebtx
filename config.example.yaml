# dexbtx-miner — example configuration.
#
# Copy this to ~/.dexbtx-miner/config.yaml and set your payout_address.
# install.sh auto-writes a tuned config based on your detected GPU;
# this file is just a documented template for hand-editing.

# ─── Pool connection ─────────────────────────────────────────────────────
pool_host: "minebtx.com"
pool_port: 3333
pool_tls: false

# ─── Identity ────────────────────────────────────────────────────────────
# REQUIRED. Your transparent BTX payout address (btx1z...). Get one via
# `btx-cli getnewaddress` if you run your own btxd, or follow the wallet
# quickstart at https://minebtx.com.
payout_address: "btx1z...YOUR_BTX_ADDRESS_HERE..."
# Short label shown on the dashboard so you can tell rigs apart.
# Recommended pattern: "<alias>-<gpu>-<country2>-<color>" (four parts,
# all lowercase) so multiple miners with identical hardware don't
# collide on the public dashboard. Examples:
#   "kappa-5060ti-us-blue"
#   "bravo-1070-de-red"
#   "tango-4060ti-ca-green"
# Don't put your real name here — anyone can see it on the dashboard.
worker_name: "default"

# ─── Solver binary ───────────────────────────────────────────────────────
# Path to btx-gbt-solve. install.sh drops it at this default location.
gbt_solve_path: "~/.dexbtx-miner/bin/btx-gbt-solve"

# ─── Solver tuning ───────────────────────────────────────────────────────
# Universal default for all NVIDIA GPUs Pascal through Blackwell.
# See docs/TUNING.md for the per-card measured profile table.
#
# The two levers that matter most: solver_prepare_workers (CPU input
# generators) and solver_threads (CPU solver workers) — tuned PER GPU CLASS
# (see the table below). Keep solver_batch_size at 128: bigger is NOT better
# here — 256+ degrades utilization and 1024 crashes the CUDA buffer pool.
solver_backend: "cuda"
solver_threads: 8                # BTX_MATMUL_SOLVER_THREADS  ← per GPU class (see below)
solver_prepare_workers: 16       # BTX_MATMUL_PREPARE_WORKERS ← per GPU class (see below)
solver_batch_size: 128           # BTX_MATMUL_SOLVE_BATCH_SIZE (128 is best; 256+ DEGRADES, 1024 crashes the GPU)
solver_prefetch_depth: 8         # BTX_MATMUL_PREPARE_PREFETCH_DEPTH
solver_pipeline_async: 1         # BTX_MATMUL_PIPELINE_ASYNC (overlap prep+kernel)

# ─── Per-GPU-class threads/workers (install.sh sets these for you) ─────────
#   Most cards (3060-4090, 5070/5080):  solver_threads: 8,  prepare_workers: 16   ← default above
#   Slower cards (5060/5060Ti, 3060, laptop GPUs): solver_threads: 16, prepare_workers: 24
#       (a heavier CPU feed keeps a slow card busy — 5060 Ti: 85% util @ 16 vs 74% @ 8)
#   RTX 5090 / Blackwell flagship: solver_threads: 12, prepare_workers: 24
#       AND a dedicated, high-clock CPU host — a 6-core Ryzen feeds a 5090 to ~90%,
#       a shared/oversubscribed cloud EPYC stalls it ~70% no matter the config.
#   Multi-GPU rig: set gpu_inputs EQUAL TO YOUR GPU COUNT (e.g. 8 for an 8-GPU rig).
#       This is the difference between ~95% and ~40% util.
#
# DON'Ts (measured across 550 workers): solver_threads: 24 STARVES fast cards
#   (4090 drops 95%->68%); batch >=256 degrades util; gpu_inputs: 0 is DEAD
#   (post-block-125000) → 0-20% util; solver_backend: "cpu" leaves the GPU idle.

# MANDATORY: gpu_inputs=1 (GPU-generated matmul inputs).
# Post-block-125,000 the matmul A/B matrix is unique per nonce (no batch
# amortization), so GPU-generated inputs is what makes every card -- Pascal
# through Blackwell -- saturate. NOTE: pre-fork the opposite (gpu_inputs=0)
# was correct; any older config/guide telling you 0 is STALE. Always 1 now.
gpu_inputs: 1

# ─── Slice sizing ────────────────────────────────────────────────────────
# Nonces tried per solver invocation. Safety ceiling; in practice
# solver_max_seconds_per_slice (below) binds first on every modern GPU.
nonces_per_slice: 20000000

# How long a single solver slice runs before returning to the loop.
# Shorter slices = less wasted work when a new block lands network-wide
# (BTX target 90s) — the miner re-checks the job between slices and
# abandons stale work sooner. 5s caps per-block waste at ~5.5%.
# Daemon mode keeps the CUDA context across slices, so per-slice
# overhead is ~ms. Don't drop below 2s on slow CPUs.
solver_max_seconds_per_slice: 5.0

# ─── Reconnect backoff ───────────────────────────────────────────────────
reconnect_initial_s: 1.0
reconnect_max_s: 60.0

# ─── Logging ─────────────────────────────────────────────────────────────
log_level: "INFO"
